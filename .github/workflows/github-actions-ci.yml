name: RX-Beat CI
run-name: ${{ github.actor }} triggered RX Beat build on ${{ github.ref_name }} 🎧

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop, 'sprint-*']

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      HUSKY: 0

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build project
        run: npm run build
