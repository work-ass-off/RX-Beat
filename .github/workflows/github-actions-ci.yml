name: RX-Beat CI/CD
run-name: ${{ github.actor }} triggered RX Beat CI on ${{ github.head_ref || github.ref_name }} 🎧

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, 'sprint-*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  deployments: write
  pull-requests: write
  statuses: write

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      HUSKY: 0
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build project
        run: npm run build

      - name: Pull Vercel Environment Information
        run: npx vercel pull --yes --environment=preview

      - name: Vercel Build
        run: npx vercel build

      - name: Archive Vercel Build
        run: tar -czf vercel-build.tar .vercel

      - name: Upload Vercel Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-build-${{ matrix.node-version }}
          path: vercel-build.tar
          retention-days: 1

  deploy-preview:
    needs: ci
    if: startsWith(github.base_ref, 'sprint-') && github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    environment:
      name: preview (${{ github.head_ref }})
      url: ${{ steps.deploy-vercel.outputs.preview-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Vercel Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: vercel-build-22.x
          path: .

      - name: Unpack Vercel Build
        run: tar -xzf vercel-build.tar

      - name: Deploy Preview to Vercel
        id: deploy-vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prebuilt'
          vercel-version: 'latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-deployment: false

  deploy-production:
    needs: ci
    if: (github.ref_name == 'develop') && github.event_name == 'push'
    runs-on: ubuntu-latest

    environment:
      name: production
      url: ${{ steps.deploy-vercel.outputs.preview-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Vercel Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: vercel-build-22.x
          path: .

      - name: Unpack Vercel Build
        run: tar -xzf vercel-build.tar

      - name: Deploy Production to Vercel
        id: deploy-vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --prebuilt'
          vercel-version: 'latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-deployment: false
