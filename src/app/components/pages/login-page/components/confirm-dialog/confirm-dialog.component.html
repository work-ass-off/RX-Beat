<dialog class="confirm-dialog" open role="confirm-dialog">
  <h2 id="confirm-dialog-title" class="confirm-dialog-title">{{ 'DIALOG.CONFIRM_TITLE' | translate }}</h2>
  <p class="confirm-dialog-text">{{ 'DIALOG.CONFIRM_MESSAGE' | translate }}</p>
  <div class="confirm-dialog-actions">
    <button type="button" class="btn-transparent confirm-dialog-button" (click)="onButtonClick(ManageButton.CANCEL)">
      {{ 'DIALOG.CANCEL_BUTTON' | translate }}
    </button>
    <button type="button" class="btn-primary confirm-dialog-button" (click)="onButtonClick(ManageButton.CONFIRM)">
      {{ 'DIALOG.CONFIRM_BUTTON' | translate }}
    </button>
  </div>
</dialog>
