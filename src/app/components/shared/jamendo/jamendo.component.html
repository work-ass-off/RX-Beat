@if (tracks.isLoading()) {
  <app-loader></app-loader>
}

@if (tracks.error()) {
  <div class="error">
    <p>{{ tracks.error()?.message }}</p>
    <button class="btn" (click)="tracks.reload()">Click to reload</button>
  </div>
}

@if (!tracks.isLoading() && !tracks.error() && tracks.value(); as tracks) {
  @for (track of tracks; track track.id) {
    <button class="card" (click)="onClick(track)">
      <img [src]="track.image" width="100" [alt]="track.name" />
      <p>{{ track.name }}</p>
      <p>{{ track.artist_name }}</p>
    </button>
  }
}
