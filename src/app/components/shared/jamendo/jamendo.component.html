@if (jamendoTracksService.popularTracksResource.isLoading()) {
  <p>Loading...</p>
}

@if (jamendoTracksService.popularTracksResource.error()) {
  <p>Error loading tracks</p>
}

@if (jamendoTracksService.popularTracksResource.value(); as tracks) {
  @for (track of tracks; track track.id) {
    <button class="card" (click)="onClick(track)">
      <img [src]="track.image" width="100" [alt]="track.name" />
      <p>{{ track.name }}</p>
      <p>{{ track.artist_name }}</p>
    </button>
  }
}
